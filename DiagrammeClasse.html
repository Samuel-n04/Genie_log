<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 16px; }
  svg text { font-family: 'Courier New', monospace; }
  .title { font-family: 'Segoe UI', sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
</style>
</head>
<body>
<svg viewBox="0 0 1100 900" xmlns="http://www.w3.org/2000/svg" width="100%">

  <!-- ===== UTILISATEUR ===== -->
  <g id="utilisateur">
    <rect x="400" y="20" width="220" height="130" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="400" y="20" width="220" height="28" rx="4" fill="#2563eb"/>
    <text x="510" y="39" text-anchor="middle" fill="white" font-size="13" font-weight="bold">«abstract» Utilisateur</text>
    <line x1="400" y1="90" x2="620" y2="90" stroke="#2563eb" stroke-width="1"/>
    <text x="408" y="60" fill="#1e3a5f" font-size="11">- id : int</text>
    <text x="408" y="73" fill="#1e3a5f" font-size="11">- nom : String</text>
    <text x="408" y="86" fill="#1e3a5f" font-size="11">- prenom : String</text>
    <text x="408" y="103" fill="#1e3a5f" font-size="11">- email : String</text>
    <text x="408" y="116" fill="#1e3a5f" font-size="11">- motDePasse : String</text>
    <text x="408" y="129" fill="#1e3a5f" font-size="11">- telephone : String</text>
    <line x1="400" y1="133" x2="620" y2="133" stroke="#2563eb" stroke-width="1"/>
    <text x="408" y="145" fill="#2563eb" font-size="11">+ seConnecter() : bool</text>
  </g>

  <!-- ===== PATIENT ===== -->
  <g id="patient">
    <rect x="140" y="230" width="220" height="155" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <rect x="140" y="230" width="220" height="28" rx="4" fill="#16a34a"/>
    <text x="250" y="249" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Patient</text>
    <line x1="140" y1="310" x2="360" y2="310" stroke="#16a34a" stroke-width="1"/>
    <text x="148" y="270" fill="#14532d" font-size="11">- dateNaissance : Date</text>
    <text x="148" y="283" fill="#14532d" font-size="11">- adresse : String</text>
    <text x="148" y="296" fill="#14532d" font-size="11">- numeroSS : String</text>
    <text x="148" y="309" fill="#14532d" font-size="11">- groupeSanguin : String</text>
    <line x1="140" y1="313" x2="360" y2="313" stroke="#16a34a" stroke-width="1"/>
    <text x="148" y="327" fill="#16a34a" font-size="11">+ prendreRDV() : RendezVous</text>
    <text x="148" y="340" fill="#16a34a" font-size="11">+ annulerRDV(id) : bool</text>
    <text x="148" y="353" fill="#16a34a" font-size="11">+ voirDossier() : Dossier</text>
    <text x="148" y="366" fill="#16a34a" font-size="11">+ rejoindreConsult() : void</text>
    <text x="148" y="379" fill="#16a34a" font-size="11">+ voirOrdonnance() : void</text>
  </g>

  <!-- ===== MEDECIN ===== -->
  <g id="medecin">
    <rect x="680" y="230" width="230" height="155" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <rect x="680" y="230" width="230" height="28" rx="4" fill="#ca8a04"/>
    <text x="795" y="249" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Médecin</text>
    <line x1="680" y1="310" x2="910" y2="310" stroke="#ca8a04" stroke-width="1"/>
    <text x="688" y="270" fill="#713f12" font-size="11">- specialite : String</text>
    <text x="688" y="283" fill="#713f12" font-size="11">- numeroDOrdre : String</text>
    <text x="688" y="296" fill="#713f12" font-size="11">- cabinet : String</text>
    <text x="688" y="309" fill="#713f12" font-size="11">- tarifConsultation : float</text>
    <line x1="680" y1="313" x2="910" y2="313" stroke="#ca8a04" stroke-width="1"/>
    <text x="688" y="327" fill="#ca8a04" font-size="11">+ validerRDV(id) : bool</text>
    <text x="688" y="340" fill="#ca8a04" font-size="11">+ creerOrdonnance() : Ordonnance</text>
    <text x="688" y="353" fill="#ca8a04" font-size="11">+ gererDisponibilites() : void</text>
    <text x="688" y="366" fill="#ca8a04" font-size="11">+ demarrerConsult() : void</text>
    <text x="688" y="379" fill="#ca8a04" font-size="11">+ voirDossierPatient() : void</text>
  </g>

  <!-- ===== RENDEZVOUS ===== -->
  <g id="rdv">
    <rect x="400" y="270" width="220" height="145" rx="4" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <rect x="400" y="270" width="220" height="28" rx="4" fill="#db2777"/>
    <text x="510" y="289" text-anchor="middle" fill="white" font-size="13" font-weight="bold">RendezVous</text>
    <line x1="400" y1="348" x2="620" y2="348" stroke="#db2777" stroke-width="1"/>
    <text x="408" y="310" fill="#831843" font-size="11">- id : int</text>
    <text x="408" y="323" fill="#831843" font-size="11">- date : DateTime</text>
    <text x="408" y="336" fill="#831843" font-size="11">- motif : String</text>
    <text x="408" y="349" fill="#831843" font-size="11">- statut : Enum</text>
    <line x1="400" y1="352" x2="620" y2="352" stroke="#db2777" stroke-width="1"/>
    <text x="408" y="366" fill="#db2777" font-size="11">+ confirmer() : void</text>
    <text x="408" y="379" fill="#db2777" font-size="11">+ annuler() : void</text>
    <text x="408" y="392" fill="#db2777" font-size="11">+ reprogrammer(d) : void</text>
    <text x="408" y="405" fill="#db2777" font-size="11">+ envoyerRappel() : void</text>
  </g>

  <!-- ===== CRENEAU ===== -->
  <g id="creneau">
    <rect x="680" y="460" width="220" height="120" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <rect x="680" y="460" width="220" height="28" rx="4" fill="#ea580c"/>
    <text x="790" y="479" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Créneau</text>
    <line x1="680" y1="535" x2="900" y2="535" stroke="#ea580c" stroke-width="1"/>
    <text x="688" y="500" fill="#7c2d12" font-size="11">- id : int</text>
    <text x="688" y="513" fill="#7c2d12" font-size="11">- heureDebut : Time</text>
    <text x="688" y="526" fill="#7c2d12" font-size="11">- heureFin : Time</text>
    <text x="688" y="539" fill="#7c2d12" font-size="11">- disponible : bool</text>
    <line x1="680" y1="542" x2="900" y2="542" stroke="#ea580c" stroke-width="1"/>
    <text x="688" y="556" fill="#ea580c" font-size="11">+ bloquer() : void</text>
    <text x="688" y="569" fill="#ea580c" font-size="11">+ liberer() : void</text>
  </g>

  <!-- ===== DOSSIER MEDICAL ===== -->
  <g id="dossier">
    <rect x="140" y="470" width="220" height="120" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <rect x="140" y="470" width="220" height="28" rx="4" fill="#7c3aed"/>
    <text x="250" y="489" text-anchor="middle" fill="white" font-size="13" font-weight="bold">DossierMédical</text>
    <line x1="140" y1="545" x2="360" y2="545" stroke="#7c3aed" stroke-width="1"/>
    <text x="148" y="510" fill="#3b0764" font-size="11">- id : int</text>
    <text x="148" y="523" fill="#3b0764" font-size="11">- dateCreation : Date</text>
    <text x="148" y="536" fill="#3b0764" font-size="11">- antecedents : String</text>
    <text x="148" y="549" fill="#3b0764" font-size="11">- allergies : String</text>
    <line x1="140" y1="552" x2="360" y2="552" stroke="#7c3aed" stroke-width="1"/>
    <text x="148" y="566" fill="#7c3aed" font-size="11">+ ajouterEntree() : void</text>
    <text x="148" y="579" fill="#7c3aed" font-size="11">+ exporterPDF() : File</text>
  </g>

  <!-- ===== ORDONNANCE ===== -->
  <g id="ordonnance">
    <rect x="140" y="680" width="220" height="120" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <rect x="140" y="680" width="220" height="28" rx="4" fill="#dc2626"/>
    <text x="250" y="699" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Ordonnance</text>
    <line x1="140" y1="755" x2="360" y2="755" stroke="#dc2626" stroke-width="1"/>
    <text x="148" y="720" fill="#7f1d1d" font-size="11">- id : int</text>
    <text x="148" y="733" fill="#7f1d1d" font-size="11">- dateEmission : Date</text>
    <text x="148" y="746" fill="#7f1d1d" font-size="11">- medicaments : List</text>
    <text x="148" y="759" fill="#7f1d1d" font-size="11">- instructions : String</text>
    <line x1="140" y1="762" x2="360" y2="762" stroke="#dc2626" stroke-width="1"/>
    <text x="148" y="776" fill="#dc2626" font-size="11">+ genererPDF() : File</text>
    <text x="148" y="789" fill="#dc2626" font-size="11">+ verifierQRCode() : bool</text>
  </g>

  <!-- ===== CONSULTATION VIDEO ===== -->
  <g id="consultation">
    <rect x="400" y="490" width="230" height="125" rx="4" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <rect x="400" y="490" width="230" height="28" rx="4" fill="#059669"/>
    <text x="515" y="509" text-anchor="middle" fill="white" font-size="13" font-weight="bold">ConsultationVideo</text>
    <line x1="400" y1="565" x2="630" y2="565" stroke="#059669" stroke-width="1"/>
    <text x="408" y="530" fill="#064e3b" font-size="11">- id : int</text>
    <text x="408" y="543" fill="#064e3b" font-size="11">- lienSalon : String</text>
    <text x="408" y="556" fill="#064e3b" font-size="11">- duree : int</text>
    <text x="408" y="569" fill="#064e3b" font-size="11">- statut : Enum</text>
    <line x1="400" y1="572" x2="630" y2="572" stroke="#059669" stroke-width="1"/>
    <text x="408" y="586" fill="#059669" font-size="11">+ demarrer() : void</text>
    <text x="408" y="599" fill="#059669" font-size="11">+ terminer() : void</text>
    <text x="408" y="612" fill="#059669" font-size="11">+ genererLien() : String</text>
  </g>

  <!-- ===== NOTIFICATION ===== -->
  <g id="notif">
    <rect x="400" y="710" width="220" height="115" rx="4" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
    <rect x="400" y="710" width="220" height="28" rx="4" fill="#0284c7"/>
    <text x="510" y="729" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Notification</text>
    <line x1="400" y1="785" x2="620" y2="785" stroke="#0284c7" stroke-width="1"/>
    <text x="408" y="750" fill="#0c4a6e" font-size="11">- id : int</text>
    <text x="408" y="763" fill="#0c4a6e" font-size="11">- message : String</text>
    <text x="408" y="776" fill="#0c4a6e" font-size="11">- type : Enum</text>
    <text x="408" y="789" fill="#0c4a6e" font-size="11">- dateEnvoi : DateTime</text>
    <line x1="400" y1="792" x2="620" y2="792" stroke="#0284c7" stroke-width="1"/>
    <text x="408" y="806" fill="#0284c7" font-size="11">+ envoyer() : void</text>
    <text x="408" y="819" fill="#0284c7" font-size="11">+ marquerLue() : void</text>
  </g>

  <!-- ========== RELATIONS ========== -->

  <!-- Héritage Patient -> Utilisateur -->
  <line x1="250" y1="230" x2="430" y2="150" stroke="#555" stroke-width="1.5" stroke-dasharray="none"/>
  <polygon points="430,150 418,144 422,157" fill="white" stroke="#555" stroke-width="1.5"/>

  <!-- Héritage Medecin -> Utilisateur -->
  <line x1="795" y1="230" x2="590" y2="150" stroke="#555" stroke-width="1.5"/>
  <polygon points="590,150 600,144 598,157" fill="white" stroke="#555" stroke-width="1.5"/>

  <!-- Patient -> RendezVous (1 ---> 0..*) -->
  <line x1="360" y1="310" x2="400" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="362" y="330" font-size="10" fill="#555">1</text>
  <text x="375" y="355" font-size="10" fill="#555">0..*</text>

  <!-- Medecin -> RendezVous (1 ---> 0..*) -->
  <line x1="680" y1="340" x2="620" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="672" y="332" font-size="10" fill="#555">1</text>
  <text x="624" y="332" font-size="10" fill="#555">0..*</text>

  <!-- Medecin -> Créneau (1 ---> 0..*) -->
  <line x1="795" y1="385" x2="795" y2="460" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="798" y="420" font-size="10" fill="#555">1 / 0..*</text>

  <!-- RendezVous -> ConsultationVideo (1 ---> 0..1) -->
  <line x1="510" y1="415" x2="510" y2="490" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="514" y="455" font-size="10" fill="#555">1 / 0..1</text>

  <!-- RendezVous -> Notification (1 ---> 0..*) -->
  <line x1="510" y1="415" x2="510" y2="710" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Patient -> DossierMédical (1 ---> 1) -->
  <line x1="250" y1="385" x2="250" y2="470" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="254" y="430" font-size="10" fill="#555">1 / 1</text>

  <!-- DossierMédical -> Ordonnance (1 ---> 0..*) -->
  <line x1="250" y1="590" x2="250" y2="680" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="254" y="637" font-size="10" fill="#555">1 / 0..*</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Légende -->
  <rect x="850" y="20" width="230" height="110" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="965" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50" font-family="Segoe UI, sans-serif">Légende</text>
  <line x1="870" y1="55" x2="920" y2="55" stroke="#555" stroke-width="1.5"/>
  <polygon points="920,55 912,51 912,59" fill="white" stroke="#555" stroke-width="1.5"/>
  <text x="930" y="59" font-size="11" fill="#333" font-family="Segoe UI, sans-serif">Héritage</text>
  <line x1="870" y1="75" x2="920" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="930" y="79" font-size="11" fill="#333" font-family="Segoe UI, sans-serif">Association</text>
  <line x1="870" y1="95" x2="920" y2="95" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="930" y="99" font-size="11" fill="#333" font-family="Segoe UI, sans-serif">Dépendance</text>
  <text x="870" y="119" font-size="10" fill="#666" font-family="Segoe UI, sans-serif">Multiplicités : 1, 0..*, 0..1, 1..*</text>

  <!-- Titre -->
  <text x="550" y="875" text-anchor="middle" class="title" font-size="15">Diagramme de Classes — Système de Gestion de RDV Médicaux</text>

</svg>
</body>
</html>
